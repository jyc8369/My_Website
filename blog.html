<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | jyc8369 Showcase</title>
  <meta name="description" content="jyc8369 개발 잡담 블로그">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
:root {
  --bg: #000000;
  --surface: #050505;
  --surface-soft: #0b0b0b;
  --line: #1f1f1f;
  --text: #f5f5f5;
  --sub: rgba(245, 245, 245, 0.66);
  --accent: #f5f5f5;
  --radius: 16px;
  --max: 980px;
}

:root[data-theme="light"] {
  --bg: #ffffff;
  --surface: #ffffff;
  --surface-soft: #fafafa;
  --line: #eaeaea;
  --text: #171717;
  --sub: rgba(23, 23, 23, 0.7);
  --accent: #171717;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  color: var(--text);
  font-family: "Space Grotesk", sans-serif;
  background: var(--bg);
  min-height: 100vh;
}

a { color: inherit; text-decoration: none; }

.container {
  width: min(var(--max), calc(100vw - 40px));
  margin: 0 auto;
}

.top-nav {
  position: sticky;
  top: 0;
  left: 0;
  transform: none;
  width: 100%;
  padding: 12px 20px;
  border-bottom: 1px solid var(--line);
  background: color-mix(in srgb, var(--surface-soft) 88%, transparent);
  backdrop-filter: blur(14px);
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
}

.top-nav .container {
  width: min(1180px, calc(100vw - 40px));
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.brand {
  font-family: "Bebas Neue", sans-serif;
  font-size: 24px;
  letter-spacing: 0.06em;
  margin-right: 18px;
}

.links {
  display: flex;
  list-style: none;
  padding: 0;
  margin: 0;
  align-items: center;
  flex-wrap: nowrap;
  gap: 16px;
  color: var(--sub);
  font-size: 14px;
}

.top-nav ul {
  justify-content: flex-end;
}

.links a:hover,
.links a[aria-current="page"] { color: var(--text); }

header {
  padding: 64px 0 32px;
}

.kicker {
  display: inline-block;
  padding: 5px 11px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--text);
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

h1 {
  margin: 16px 0 10px;
  font-family: "Bebas Neue", sans-serif;
  font-size: clamp(46px, 9vw, 92px);
  line-height: 0.9;
}

.lead {
  color: var(--sub);
  margin: 0;
  max-width: 62ch;
  line-height: 1.7;
}

main {
  padding: 24px 0 90px;
}

.frame {
  border-top: 1px solid var(--line);
}

.frame .container {
  border-left: 1px solid var(--line);
  border-right: 1px solid var(--line);
  padding-left: 24px;
  padding-right: 24px;
}

.post-list {
  display: grid;
  gap: 12px;
}

.post {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px;
  background: var(--surface);
  transition: transform 0.24s;
}

.post:hover { transform: translateY(-2px); }

.post-link {
  display: block;
}

.post h2 {
  margin: 0;
  font-size: 24px;
}

.post p {
  margin: 8px 0 0;
  color: var(--sub);
  line-height: 1.65;
}

.date {
  margin-top: 12px;
  font-size: 12px;
  color: var(--text);
}

.post-view {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
  padding: 20px;
}

.back-link {
  display: inline-block;
  margin-bottom: 14px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 7px 12px;
  font-size: 13px;
}

.post-article h1,
.post-article h2 {
  margin: 0 0 10px;
  color: var(--text);
}

.post-article p,
.post-article li {
  color: var(--sub);
  line-height: 1.7;
}

.post-article ul {
  padding-left: 18px;
}

.post-article code {
  border: 1px solid var(--line);
  border-radius: 6px;
  background: var(--surface-soft);
  padding: 1px 6px;
  font-size: 12px;
  color: var(--text);
}

.theme-toggle {
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--surface);
  color: var(--text);
  font: inherit;
  font-size: 12px;
  font-weight: 700;
  padding: 6px 10px;
  cursor: pointer;
  transition: transform 0.24s ease;
}

.theme-toggle:hover {
  transform: translateY(-1px);
}

footer {
  border-top: 1px solid var(--line);
  text-align: center;
  color: var(--sub);
  padding: 24px 0 36px;
  font-size: 14px;
}

@media (max-width: 700px) {
  .container { width: min(var(--max), calc(100vw - 24px)); }
  .top-nav .container { width: min(1180px, calc(100vw - 24px)); }
  .links { gap: 10px; font-size: 12px; }
  .frame .container { padding-left: 14px; padding-right: 14px; }
}

</style>
</head>
<body>
  <nav class="top-nav">
    <div class="container">
      <a class="brand" href="main.html">JYC8369</a>
      <div class="links">
        <a href="main.html">Home</a>
        <a href="projects.html">Projects</a>
        <a href="blog.html" aria-current="page">Blog</a>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="라이트 모드로 전환">Light</button>
      </div>
    </div>
  </nav>

  <header>
    <div class="container">
      <span class="kicker">Low Priority Feed</span>
      <h1>BLOG</h1>
      <p class="lead">블로그</p>
    </div>
  </header>

  <main class="frame">
    <div class="container">
      <section id="post-list" class="post-list"></section>
      <section id="post-view" class="post-view" hidden></section>
    </div>
  </main>

  <footer>
    <div class="container">© 2026 jyc8369. Blog page.</div>
  </footer>

  <script>
const themeRoot = document.documentElement;
const themeKey = 'theme-preference';
const themeButton = document.getElementById('theme-toggle');
const savedTheme = localStorage.getItem(themeKey);
themeRoot.dataset.theme = savedTheme === 'light' ? 'light' : 'dark';

const updateThemeButton = () => {
  if (!themeButton) return;
  const isLight = themeRoot.dataset.theme === 'light';
  themeButton.textContent = isLight ? 'Dark' : 'Light';
  themeButton.setAttribute('aria-label', isLight ? '다크 모드로 전환' : '라이트 모드로 전환');
};

if (themeButton) {
  themeButton.addEventListener('click', () => {
    themeRoot.dataset.theme = themeRoot.dataset.theme === 'light' ? 'dark' : 'light';
    localStorage.setItem(themeKey, themeRoot.dataset.theme);
    updateThemeButton();
  });
}

updateThemeButton();

const postListEl = document.getElementById("post-list");
const postViewEl = document.getElementById("post-view");

const escapeHtml = (text) =>
  text
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");

const parseInline = (text) => {
  let out = escapeHtml(text);
  out = out.replace(/`([^`]+)`/g, "<code>$1</code>");
  out = out.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  return out;
};

const markdownToHtml = (markdown) => {
  const lines = markdown.split(/\r?\n/);
  let html = "";
  let inList = false;

  for (const rawLine of lines) {
    const line = rawLine.trim();

    if (!line) {
      if (inList) {
        html += "</ul>";
        inList = false;
      }
      continue;
    }

    if (line.startsWith("# ")) {
      if (inList) {
        html += "</ul>";
        inList = false;
      }
      html += `<h1>${parseInline(line.slice(2))}</h1>`;
      continue;
    }

    if (line.startsWith("## ")) {
      if (inList) {
        html += "</ul>";
        inList = false;
      }
      html += `<h2>${parseInline(line.slice(3))}</h2>`;
      continue;
    }

    if (line.startsWith("- ")) {
      if (!inList) {
        html += "<ul>";
        inList = true;
      }
      html += `<li>${parseInline(line.slice(2))}</li>`;
      continue;
    }

    if (inList) {
      html += "</ul>";
      inList = false;
    }
    html += `<p>${parseInline(line)}</p>`;
  }

  if (inList) {
    html += "</ul>";
  }

  return html;
};

const renderList = (posts) => {
  postViewEl.hidden = true;
  postListEl.hidden = false;

  postListEl.innerHTML = posts
    .map(
      (post) => `
      <article class="post">
        <a class="post-link" href="blog.html?post=${encodeURIComponent(post.slug)}">
          <h2>${escapeHtml(post.title)}</h2>
          <p>${escapeHtml(post.summary)}</p>
          <div class="date">${escapeHtml(post.date)}</div>
        </a>
      </article>
    `
    )
    .join("");
};

const renderPost = async (posts, slug) => {
  const post = posts.find((item) => item.slug === slug);
  if (!post) {
    renderList(posts);
    return;
  }

  const response = await fetch(post.file);
  const markdown = await response.text();

  postListEl.hidden = true;
  postViewEl.hidden = false;
  postViewEl.innerHTML = `
    <a class="back-link" href="blog.html">목록으로 돌아가기</a>
    <div class="post-article">${markdownToHtml(markdown)}</div>
  `;
};

const init = async () => {
  try {
    const response = await fetch("content/blog/posts.json");
    const posts = await response.json();
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("post");

    if (!slug) {
      renderList(posts);
      return;
    }

    await renderPost(posts, slug);
  } catch (error) {
    postListEl.hidden = false;
    postViewEl.hidden = true;
    postListEl.innerHTML = '<article class="post"><h2>블로그 로드 실패</h2><p>정적 파일을 불러오지 못했습니다. 배포 환경에서 다시 확인해 주세요.</p></article>';
  }
};

init();

</script>
</body>
</html>
